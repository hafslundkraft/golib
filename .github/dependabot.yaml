version: 2
updates:
  - package-ecosystem: "gomod"
    directories:
      - "/*"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Europe/Oslo"
    groups:
      all:
        patterns: ["*"]
    commit-message:
      prefix: "deps"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Europe/Oslo"
    groups:
      all:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
